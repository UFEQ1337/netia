name: Testy API i UI (Playwright)

# Uruchamia całe środowisko docker-compose, a następnie testy API i UI względem
# działającej aplikacji. Raport HTML jest publikowany jako artefakt.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start środowiska (docker compose build + up)
        working-directory: docker
        run: docker compose up -d --build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qa/package-lock.json

      - name: Instalacja zależności testów
        working-directory: qa
        run: npm ci

      - name: Instalacja przeglądarki Playwright
        working-directory: qa
        run: npx playwright install --with-deps chromium

      - name: Testy (API + UI)
        working-directory: qa
        # globalSetup (readiness check) czeka na gotowość środowiska przed startem testów.
        run: npm test

      - name: Logi środowiska (przy niepowodzeniu)
        if: failure()
        working-directory: docker
        run: docker compose logs --no-color --tail=200

      - name: Raport Playwright (artefakt)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: qa/playwright-report
          retention-days: 14

      - name: Zatrzymanie środowiska
        if: always()
        working-directory: docker
        run: docker compose down -v
